# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'oluevaera/tmux-conda-inherit'

# theming
set -g @plugin 'dracula/tmux'

# better copying in copy mode
set -g @plugin 'tmux-plugins/tmux-yank'

# session persistence across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'


# Set default shell to zsh
set -g default-shell /bin/zsh

# Scrollback history limit
set -g history-limit 10000

# Enable Vim-like key bindings for tmux
# turn on scrolling
set -g mouse on

# set new prefix
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi J send-keys -X -N 10 scroll-down
bind-key -T copy-mode-vi K send-keys -X -N 10 scroll-up


# make prefix + n open a new window in the same dir
unbind c
bind n new-window -a -c "#{pane_current_path}"

# (optional) same for splits
unbind %
bind i split-window -h -c "#{pane_current_path}"
unbind '"'
bind s split-window -v -c "#{pane_current_path}"
bind e select-layout tiled \; set-option -w @layout tiled
bind E select-layout even-horizontal \; set-option -w @layout even-horizontal

# Swap pane in direction
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Resize pane (repeatable)
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Promote current pane to main (big left, others stacked right)
bind m swap-pane -t 0 \; select-layout main-vertical \; resize-pane -t 0 -x 65% \; set-option -w @layout main-vertical

# Vim-style scroll (no prefix)
bind -n M-u copy-mode \; send-keys -X halfpage-up
bind -n M-d copy-mode \; send-keys -X halfpage-down

# Move pane: C-a + h/j/k/l (no prefix needed)
bind -n C-a switch-client -T move-pane
bind -T move-pane h run-shell 'tmux join-pane -t :-1 && layout=$(tmux show-option -wqv -t :-0 @layout); tmux select-layout -t :-0 "${layout:-even-horizontal}"'
bind -T move-pane l run-shell 'tmux join-pane -t :+1 && layout=$(tmux show-option -wqv -t :+0 @layout); tmux select-layout -t :+0 "${layout:-even-horizontal}"'
bind -T move-pane k run-shell 'cur=$(tmux display -p "##S"); prev=$(tmux list-sessions -F "##S" | grep -B1 "^$cur$" | head -1); [ "$prev" != "$cur" ] && tmux join-pane -t "$prev:" && layout=$(tmux show-option -wqv -t "$prev:" @layout) && tmux select-layout -t "$prev:" "${layout:-even-horizontal}" && tmux switch-client -t "$prev"'
bind -T move-pane j run-shell 'cur=$(tmux display -p "##S"); next=$(tmux list-sessions -F "##S" | grep -A1 "^$cur$" | tail -1); [ "$next" != "$cur" ] && tmux join-pane -t "$next:" && layout=$(tmux show-option -wqv -t "$next:" @layout) && tmux select-layout -t "$next:" "${layout:-even-horizontal}" && tmux switch-client -t "$next"'

# window controls
bind h previous-window
bind l next-window
bind o last-window
set -g base-index 1
set -g renumber-windows on

# Let applications (like Claude Code) set window titles via escape sequences
set -g allow-passthrough on
set -g allow-rename on
set -g set-titles on

# Alt+number to switch windows (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 0

# Alt+o/h/l/n for window navigation (no prefix needed)
bind -n M-o last-window
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-n new-window -a -c "#{pane_current_path}"
bind -n M-w confirm-before -p "Kill window #W? (y/n)" kill-window

# Alt+Shift+h/l to move window left/right (no prefix needed)
bind -n M-H swap-window -t -1 \; previous-window
bind -n M-L swap-window -t +1 \; next-window

# 3D navigation: sessions as vertical stack (M-j/M-k)
# Ordered by @order session option (no number-prefix naming needed)
bind -n M-k run-shell '$HOME/.tmux/scripts/tmux-order prev'
bind -n M-j run-shell '$HOME/.tmux/scripts/tmux-order next'
bind -n M-O switch-client -l  # last session (like M-o for last window)

# M-J/M-K to swap session order
bind -n M-J run-shell '$HOME/.tmux/scripts/tmux-order swap-next'
bind -n M-K run-shell '$HOME/.tmux/scripts/tmux-order swap-prev'



# Session management (matches window pattern: M-n/M-N, M-w/M-W)
bind -n M-N run-shell 'name="$(basename "#{pane_current_path}")"; tmux new-session -d -s "$name" -c "#{pane_current_path}" && tmux switch-client -t "$name"'
bind -n M-W confirm-before -p "Kill session #S? (y/n)" kill-session  # close session
# M-r: rename session (popup)
bind -n M-r display-popup -E -w 40 -h 3 'bash -c "read -p \"Rename: \" name; [ -n \"\$name\" ] && tmux rename-session \"\$name\""'
# M-R: rename current window
bind -n M-R display-popup -E -w 40 -h 3 'bash -c "read -p \"Rename: \" name; tmux rename-window \"\$name\""'
# M-`: persistent scratchpad (toggle)
bind -n M-\` if-shell '[ "$(tmux display -p "#S")" = "scratch" ]' \
  'detach-client' \
  'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "tmux new-session -A -s scratch"'

# M-P: rename current pane
bind -n M-P display-popup -E -w 40 -h 3 'bash -c "read -p \"Pane name: \" name; tmux select-pane -T \"\$name\""'

# Show pane titles in border
set -g pane-border-status top
set -g pane-border-format "#[fg=#EBDBB2,bold] #{pane_index}: #{pane_title} #[default]"

# When session is destroyed, switch to another instead of detaching
set -g detach-on-destroy off

# Auto-assign @order to new sessions, compact on close
set-hook -g session-created 'run-shell "$HOME/.tmux/scripts/tmux-order assign"'
set-hook -g session-closed 'run-shell "$HOME/.tmux/scripts/tmux-order compact"'


# Session picker (native menu, sorted by @order)
bind -n M-s run-shell '$HOME/.tmux/scripts/tmux-order ordered-menu'



# put bar on bottom
set -g status-position bottom
set -g status on


# fix colors
set -ga terminal-overrides ",xterm-256color:Tc"


# theming (dracula/tmux)
# https://github.com/dracula/tmux
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon "λ  #S"
set -g @dracula-plugins "mac-player git network-vpn battery time"
set -g @dracula-mac-player-remote true
set -g @dracula-mac-player-app "Spotify"
set -g @dracula-mac-player-length 50
set -g @dracula-mac-player-remote-play-pause "Space"
set -g @dracula-mac-player-remote-back ","
set -g @dracula-mac-player-remote-next "."
set -g @dracula-git-disable-status true
set -g @dracula-git-show-current-symbol ""
set -g @dracula-show-timezone false
set -g @dracula-battery-label false

set -g @dracula-colors "
# simple gruvbox Color Pallette
white='#EBDBB2'
gray='#32302F'
dark_gray='#282828'
light_purple='#B16286'
dark_purple='#504945'
cyan='#689D6A'
green='#98971A'
orange='#D65D0E'
red='#CC241D'
pink='#D3869B'
yellow='#D79921'
"

# Telescope-style file picker → open in nvim popup
bind f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E \
  'file=$(fd --type f --hidden --exclude .git --exec stat -f "%m %N" {} | sort -rn | cut -d" " -f2- | fzf --preview "bat --color=always --style=numbers --line-range=:500 {}"); \
  [ -n "$file" ] && echo "$file" > /tmp/nvim-popup-last && nvim -c "nnoremap <Esc><Esc> :q!<CR>" "$file"'

# Split pane and launch claude --dangerously-skip-permissions
bind c split-window -h -c "#{pane_current_path}" "claude --dangerously-skip-permissions" \; select-layout even-horizontal

# Open last modified spec
bind a display-popup -d "#{pane_current_path}" -w 90% -h 90% -E \
  'file=$(ls -t .claude/specs/ 2>/dev/null | head -1); \
  [ -n "$file" ] && nvim -c "nnoremap <Esc><Esc> :q!<CR>" ".claude/specs/$file"'

# Open last modified plan
bind r display-popup -d "#{pane_current_path}" -w 90% -h 90% -E \
  'file=$(ls -t .claude/plans/ 2>/dev/null | head -1); \
  [ -n "$file" ] && nvim -c "nnoremap <Esc><Esc> :q!<CR>" ".claude/plans/$file"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
source-file /Users/1unoe/.sisyphus/tmux.conf # sisyphus-managed — do not edit
